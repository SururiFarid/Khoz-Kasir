<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Kasir KHOZ</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          Segoe UI,
          sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f6f9;
      }

      .login-box {
        width: 350px;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-weight: bold;
      }

      .error {
        color: red;
        text-align: center;
        margin-top: 10px;
      }

      .info {
        margin-top: 15px;
        font-size: 13px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>LOGIN KASIR KHOZ</h2>

      <input type="text" id="username" placeholder="Username" />

      <input type="password" id="password" placeholder="Password" />

      <button onclick="login()">LOGIN</button>

      <div id="error" class="error"></div>
    </div>

    <script>
      const users = [
        {
          username: "admin",
          password: "admin0724",
          namaKasir: "Admin",
        },

        {
          username: "siti",
          password: "111111",
          namaKasir: "Siti",
        },

        {
          username: "budi",
          password: "222222",
          namaKasir: "Budi",
        },
      ];

      function login() {
        const username = document.getElementById("username").value.trim();

        const password = document.getElementById("password").value.trim();

        const user = users.find(
          (u) => u.username === username && u.password === password,
        );

        if (user) {
          localStorage.setItem("login", "true");

          localStorage.setItem("namaKasir", user.namaKasir);

          window.location.href = "index.html";
        } else {
          document.getElementById("error").innerText =
            "Username atau Password salah!";
        }
      }
    </script>
  </body>
</html>
